<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Pomodoro">
    <title>Pomodoro</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        body {
            background: #F2E4D4;
            font-family: -apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif;
            min-height: 100svh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: max(env(safe-area-inset-top,0px),48px) 24px max(env(safe-area-inset-bottom,0px),28px);
            color: #1E4D3A;
        }

        .eyebrow {
            font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
            text-transform: uppercase; opacity: 0.45; margin-bottom: 3px;
        }

        .heading {
            font-size: 36px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 14px;
        }

        /* Duration picker */
        .picker {
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 14px; transition: opacity 0.2s ease;
        }
        .picker.disabled { opacity: 0.3; pointer-events: none; }

        .picker-label {
            font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
            text-transform: uppercase; opacity: 0.55;
        }

        .dur-btns {
            display: flex; gap: 3px;
            background: rgba(30,77,58,0.1); border-radius: 100px; padding: 3px;
        }

        .dur-btn {
            height: 30px; min-width: 34px; padding: 0 8px;
            border-radius: 100px; border: none;
            font-size: 14px; font-weight: 600; cursor: pointer;
            color: #1E4D3A; background: transparent;
            transition: background 0.15s ease, color 0.15s ease;
            touch-action: manipulation;
        }

        .dur-btn.active { background: #1E4D3A; color: #F2E4D4; }

        .picker-unit {
            font-size: 11px; font-weight: 600; letter-spacing: 0.1em;
            text-transform: uppercase; opacity: 0.55;
        }

        .bag-wrap { width: 280px; height: 345px; }

        .timer-block { text-align: center; margin: 12px 0 22px; }

        .time {
            font-size: 72px; font-weight: 700; letter-spacing: -0.04em;
            line-height: 1; transition: color 0.4s ease;
        }
        .time.break-mode { color: #F0B429; }

        .time-sub {
            font-size: 11px; font-weight: 600; letter-spacing: 0.16em;
            text-transform: uppercase; opacity: 0.5; margin-top: 8px;
        }

        .controls { display: flex; gap: 10px; }

        .btn {
            height: 52px; padding: 0 28px; border-radius: 100px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            border: 2.5px solid #1E4D3A; letter-spacing: 0.01em;
            transition: transform 0.12s ease, opacity 0.12s ease;
            touch-action: manipulation;
        }
        .btn:active { transform: scale(0.94); opacity: 0.85; }
        .btn-fill { background: #1E4D3A; color: #F2E4D4; min-width: 128px; }
        .btn-outline { background: transparent; color: #1E4D3A; }
        .hidden { display: none !important; }

        /* Done overlay */
        .done {
            display: none; position: fixed; inset: 0; background: #F2E4D4;
            flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; padding: 40px 32px;
        }
        .done.on { display: flex; }
        .done-icon { margin-bottom: 26px; }
        .done h2 {
            font-size: 40px; font-weight: 800; text-align: center;
            line-height: 1.15; margin-bottom: 10px; letter-spacing: -0.02em;
        }
        .done p { font-size: 16px; text-align: center; opacity: 0.55; line-height: 1.6; margin-bottom: 44px; }
        .done-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 260px; }
        .done-btns .btn { width: 100%; }
        .btn-yellow { background: #F0B429; color: #1E4D3A; border-color: #F0B429; }
    </style>
</head>
<body>

    <div class="eyebrow">Focus Session</div>
    <div class="heading">Pomodoro</div>

    <div class="picker" id="picker">
        <span class="picker-label">Set</span>
        <div class="dur-btns">
            <button class="dur-btn"        data-d="1"  onclick="setDuration(1)">1</button>
            <button class="dur-btn"        data-d="5"  onclick="setDuration(5)">5</button>
            <button class="dur-btn"        data-d="10" onclick="setDuration(10)">10</button>
            <button class="dur-btn"        data-d="15" onclick="setDuration(15)">15</button>
            <button class="dur-btn"        data-d="20" onclick="setDuration(20)">20</button>
            <button class="dur-btn active" data-d="25" onclick="setDuration(25)">25</button>
        </div>
        <span class="picker-unit">min</span>
    </div>

    <div class="bag-wrap">
        <!--
            Bag inner area: x 26–254 (228px), y 140–320 (180px, below fold line)
            Tomato layouts are hardcoded per duration so sizing fills the bag nicely.
        -->
        <svg id="bagSvg" viewBox="0 0 280 345" width="280" height="345" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <clipPath id="bagClip">
                    <rect x="26" y="140" width="228" height="180"/>
                </clipPath>
            </defs>
            <!-- Left handle -->
            <path d="M 90,100 C 90,42 145,42 145,100"
                  fill="none" stroke="#1E4D3A" stroke-width="7" stroke-linecap="round"/>
            <!-- Right handle -->
            <path d="M 155,100 C 155,42 210,42 210,100"
                  fill="none" stroke="#1E4D3A" stroke-width="7" stroke-linecap="round"/>
            <!-- Bag fill -->
            <rect x="26" y="100" width="228" height="220" rx="6" fill="#F2E4D4"/>
            <!-- Tomatoes (clipped to bag interior) -->
            <g id="tg" clip-path="url(#bagClip)"></g>
            <!-- Bag outline on top -->
            <rect x="26" y="100" width="228" height="220" rx="6"
                  fill="none" stroke="#1E4D3A" stroke-width="5"/>
            <!-- Fold line -->
            <line x1="26" y1="140" x2="254" y2="140" stroke="#1E4D3A" stroke-width="3"/>
        </svg>
    </div>

    <div class="timer-block">
        <div class="time" id="disp">25:00</div>
        <div class="time-sub" id="lbl">minutes remaining</div>
    </div>

    <div class="controls">
        <button class="btn btn-fill" id="mainBtn" onclick="handleMain()">Start</button>
        <button class="btn btn-outline hidden" id="rstBtn" onclick="handleReset()">Reset</button>
    </div>

    <!-- Done overlay -->
    <div class="done" id="doneScreen">
        <div class="done-icon">
            <svg width="100" height="100" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="48" fill="#F0B429"/>
                <rect x="8"  y="2" width="13" height="96" fill="#F5CA5C" opacity="0.65"/>
                <rect x="34" y="2" width="13" height="96" fill="#F5CA5C" opacity="0.65"/>
                <rect x="60" y="2" width="13" height="96" fill="#F5CA5C" opacity="0.65"/>
                <rect x="86" y="2" width="13" height="96" fill="#F5CA5C" opacity="0.65"/>
                <ellipse cx="50" cy="64" rx="27" ry="25" fill="#C8392B"/>
                <ellipse cx="38" cy="53" rx="8"  ry="6"  fill="#E05A4B" opacity="0.35"/>
                <rect x="47.5" y="30" width="5" height="12" rx="2.5" fill="#1E4D3A"/>
                <line x1="50" y1="40" x2="36" y2="30" stroke="#1E4D3A" stroke-width="3.5" stroke-linecap="round"/>
                <line x1="50" y1="38" x2="50" y2="24" stroke="#1E4D3A" stroke-width="3.5" stroke-linecap="round"/>
                <line x1="50" y1="40" x2="64" y2="30" stroke="#1E4D3A" stroke-width="3.5" stroke-linecap="round"/>
                <line x1="50" y1="39" x2="40" y2="25" stroke="#1E4D3A" stroke-width="3"   stroke-linecap="round"/>
                <line x1="50" y1="39" x2="60" y2="25" stroke="#1E4D3A" stroke-width="3"   stroke-linecap="round"/>
            </svg>
        </div>
        <h2>Congrats,<br>You're Done!</h2>
        <p>You completed your focus session.</p>
        <div class="done-btns">
            <button class="btn btn-yellow"  onclick="startBreak()">Take a 5-min break</button>
            <button class="btn btn-outline" onclick="resetAll()">Start Over</button>
        </div>
    </div>

    <script>
        const BREAK = 5 * 60;

        // Tomato positions per duration. Tomato size (r) scales up as count decreases
        // so the bag always looks full. All validated against clip bounds (x:26-254, y:140-320).
        // Each row in positions[] fills the bag bottom-to-top, left-to-right.
        const LAYOUTS = {
            1: {
                r: 55,
                positions: [[140, 243]]
            },
            5: {
                r: 28,
                positions: [
                    [54,240],[97,240],[140,240],[183,240],[226,240]
                ]
            },
            10: {
                r: 20,
                positions: [
                    [46,295],[93,295],[140,295],[187,295],[234,295],
                    [46,174],[93,174],[140,174],[187,174],[234,174]
                ]
            },
            15: {
                r: 17,
                positions: [
                    [44,297],[92,297],[140,297],[188,297],[236,297],
                    [44,230],[92,230],[140,230],[188,230],[236,230],
                    [44,171],[92,171],[140,171],[188,171],[236,171]
                ]
            },
            20: {
                r: 15,
                positions: [
                    [41,300],[91,300],[140,300],[189,300],[238,300],
                    [41,256],[91,256],[140,256],[189,256],[238,256],
                    [41,212],[91,212],[140,212],[189,212],[238,212],
                    [41,168],[91,168],[140,168],[189,168],[238,168]
                ]
            },
            25: {
                r: 14,
                positions: [
                    [40,304],[90,304],[140,304],[190,304],[240,304],
                    [40,270],[90,270],[140,270],[190,270],[240,270],
                    [40,236],[90,236],[140,236],[190,236],[240,236],
                    [40,202],[90,202],[140,202],[190,202],[240,202],
                    [40,168],[90,168],[140,168],[190,168],[240,168]
                ]
            }
        };

        let selectedDuration = 25;
        let secs = 25 * 60;
        let iv = null;
        let going = false;
        let onBreak = false;
        let wakeLock = null;

        // Three-note chime via Web Audio API
        function playChime() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            [523.25, 659.25, 783.99].forEach((freq, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';
                osc.frequency.value = freq;
                const t = ctx.currentTime + i * 0.28;
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.45, t + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 1.6);
                osc.start(t); osc.stop(t + 1.6);
            });
        }

        function makeTomato(x, y, i, r) {
            const ns = 'http://www.w3.org/2000/svg';
            const sc = r / 14;
            const g = document.createElementNS(ns, 'g');
            g.id = 't' + i;
            g.style.cssText = 'opacity:0.18;transition:opacity 0.5s ease';

            const body = document.createElementNS(ns, 'ellipse');
            body.setAttribute('cx', x); body.setAttribute('cy', y + sc);
            body.setAttribute('rx', r); body.setAttribute('ry', Math.max(1, r - sc));
            body.setAttribute('fill', '#C8392B');

            const hl = document.createElementNS(ns, 'ellipse');
            hl.setAttribute('cx', x - 4*sc); hl.setAttribute('cy', y - 5*sc);
            hl.setAttribute('rx', 4*sc);     hl.setAttribute('ry', 3*sc);
            hl.setAttribute('fill', '#E05A4B'); hl.setAttribute('opacity', '0.4');

            const stem = document.createElementNS(ns, 'rect');
            stem.setAttribute('x', x - 1.5*sc); stem.setAttribute('y', y - r - sc);
            stem.setAttribute('width', 3*sc);    stem.setAttribute('height', 7*sc);
            stem.setAttribute('rx', 1.5*sc);     stem.setAttribute('fill', '#1E4D3A');

            [[-38, 7*sc], [0, 8*sc], [38, 7*sc]].forEach(([deg, len]) => {
                const rad = deg * Math.PI / 180;
                const l = document.createElementNS(ns, 'line');
                l.setAttribute('x1', x);
                l.setAttribute('y1', y - r + sc);
                l.setAttribute('x2', x + Math.sin(rad) * len);
                l.setAttribute('y2', (y - r + sc) - Math.cos(rad) * 5 * sc);
                l.setAttribute('stroke', '#1E4D3A');
                l.setAttribute('stroke-width', Math.max(1.5, 2 * sc));
                l.setAttribute('stroke-linecap', 'round');
                g.appendChild(l);
            });

            g.appendChild(body); g.appendChild(hl); g.appendChild(stem);
            return g;
        }

        function buildTomatoes(n) {
            const { r, positions } = LAYOUTS[n];
            const g = document.getElementById('tg');
            g.innerHTML = '';
            positions.forEach(([x, y], i) => g.appendChild(makeTomato(x, y, i, r)));
        }

        function show(n) {
            const total = selectedDuration;
            for (let i = 0; i < total; i++) {
                const el = document.getElementById('t' + i);
                if (el) el.style.opacity = i < n ? '1' : '0.18';
            }
        }

        function fmt(s) {
            return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
        }

        function tick() {
            if (secs <= 0) {
                clearInterval(iv); going = false; releaseWakeLock();
                if (onBreak) {
                    show(0); resetAll();
                } else {
                    show(selectedDuration);
                    playChime();
                    document.getElementById('disp').textContent = '00:00';
                    document.getElementById('doneScreen').classList.add('on');
                }
                return;
            }
            secs--;
            document.getElementById('disp').textContent = fmt(secs);

            if (!onBreak) {
                const elapsed = selectedDuration * 60 - secs;
                show(Math.min(selectedDuration, Math.floor(elapsed / 60)));
            } else {
                // Drain all N tomatoes evenly over the 5-min break
                const elapsed = BREAK - secs;
                const secsPerTomato = BREAK / selectedDuration;
                show(Math.max(0, selectedDuration - Math.floor(elapsed / secsPerTomato)));
            }
        }

        function setDuration(n) {
            if (going) return;
            selectedDuration = n;
            secs = n * 60;
            onBreak = false;
            document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.dur-btn[data-d="${n}"]`).classList.add('active');
            buildTomatoes(n);
            show(0);
            document.getElementById('disp').textContent = fmt(secs);
            document.getElementById('disp').classList.remove('break-mode');
            document.getElementById('lbl').textContent = 'minutes remaining';
            document.getElementById('mainBtn').textContent = 'Start';
            document.getElementById('rstBtn').classList.add('hidden');
        }

        function handleMain() {
            if (!going) {
                going = true; iv = setInterval(tick, 1000); requestWakeLock();
                document.getElementById('mainBtn').textContent = 'Pause';
                document.getElementById('rstBtn').classList.remove('hidden');
                document.getElementById('picker').classList.add('disabled');
            } else {
                going = false; clearInterval(iv); releaseWakeLock();
                document.getElementById('mainBtn').textContent = 'Resume';
                document.getElementById('picker').classList.remove('disabled');
            }
        }

        function handleReset() {
            clearInterval(iv); going = false; onBreak = false;
            secs = selectedDuration * 60; releaseWakeLock();
            buildTomatoes(selectedDuration);
            show(0);
            document.getElementById('disp').textContent = fmt(secs);
            document.getElementById('disp').classList.remove('break-mode');
            document.getElementById('lbl').textContent = 'minutes remaining';
            document.getElementById('mainBtn').textContent = 'Start';
            document.getElementById('rstBtn').classList.add('hidden');
            document.getElementById('picker').classList.remove('disabled');
        }

        function startBreak() {
            document.getElementById('doneScreen').classList.remove('on');
            onBreak = true; secs = BREAK;
            show(selectedDuration);
            document.getElementById('disp').textContent = '05:00';
            document.getElementById('disp').classList.add('break-mode');
            document.getElementById('lbl').textContent = 'break remaining';
            document.getElementById('mainBtn').textContent = 'Pause';
            document.getElementById('rstBtn').classList.remove('hidden');
            document.getElementById('picker').classList.add('disabled');
            going = true; requestWakeLock(); iv = setInterval(tick, 1000);
        }

        function resetAll() {
            clearInterval(iv); going = false; onBreak = false;
            secs = selectedDuration * 60; releaseWakeLock();
            buildTomatoes(selectedDuration);
            show(0);
            document.getElementById('disp').textContent = fmt(secs);
            document.getElementById('disp').classList.remove('break-mode');
            document.getElementById('lbl').textContent = 'minutes remaining';
            document.getElementById('mainBtn').textContent = 'Start';
            document.getElementById('rstBtn').classList.add('hidden');
            document.getElementById('picker').classList.remove('disabled');
            document.getElementById('doneScreen').classList.remove('on');
        }

        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e) {}
            }
        }

        async function releaseWakeLock() {
            if (wakeLock) { try { await wakeLock.release(); } catch(e) {} wakeLock = null; }
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && going) requestWakeLock();
        });

        buildTomatoes(selectedDuration);
        show(0);
    </script>

</body>
</html>
